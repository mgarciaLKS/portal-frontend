---
name: Umbrella Sandbox Setup

on:
  push:
    branches:
      - 'main'
      - 'test/cypress-setup'
  # workflow_run:
    # workflows: ["build.yml"]
    # types:
    #   - completed  # This ensures it runs after the build workflow is completed
  workflow_dispatch:
    inputs:
      node_image:
        description: 'kindest/node image for k8s kind cluster'
        default: 'kindest/node:v1.27.3'
        required: false
        type: string
      helm_version:
        description: 'helm version to test (default = latest)'
        default: 'latest'
        required: false
        type: string

jobs:
  setup-sandbox:
    runs-on: ubuntu-latest
    env:
      NODE_IMAGE: ${{ github.event.inputs.node_image || 'kindest/node:v1.27.3' }}
      HELM_VERSION: ${{ github.event.inputs.helm_version || 'latest' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Build portal frontend
      uses: docker/build-push-action@4a13e500e55cf31b7a5d59a38ab2040ab0f42f56 # v5.1.0
      with:
        context: .
        push: true
        tags: kind-registry:5000/portal-frontend:testing
        
    - name: Kubernetes KinD Cluster
      uses: container-tools/kind-action@0ad70e2299366b0e1552c7240f4e4567148f723e
      with:
        version: v0.20.0
        node_image: ${{ env.NODE_IMAGE }}

    - name: Verify Cluster
      run: |
        kubectl cluster-info
        kubectl get nodes -o wide

    - name: Set up Helm
      uses: azure/setup-helm@v4.1.0
      with:
        version: ${{ env.HELM_VERSION }}

    - name: Add Tractus-X Helm Repository
      run: |
        helm repo add tractusx-dev https://eclipse-tractusx.github.io/charts/dev
        helm repo update

    - name: Install Umbrella Chart Portal Subset
      run: |
        helm install \
        --set portal.enabled=true,centralidp.enabled=true,sharedidp.enabled=true umbrella tractusx-dev/umbrella \
        --set portal.frontend.image.repository=kind-registry:5000/portal-frontend --set iatpmock.image.tag=testing \
        --namespace umbrella --create-namespace

    - name: Verify Deployment
      run: |
        kubectl get pods -n umbrella
        helm ls --namespace umbrella

    - name: Debug Cluster (on failure)
      if: failure()
      run: |
        kubectl describe pods -n umbrella
        kubectl logs -n umbrella $(kubectl get pods -n umbrella -o jsonpath='{.items[0].metadata.name}')

    - name: Cleanup Resources
      if: always()
      run: |
        helm uninstall umbrella --namespace umbrella || true
        kubectl delete namespace umbrella || true
        kind delete cluster || true
